<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bhupathi Real Estates</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family: Arial; }
    .hero {
      background:url('https://images.unsplash.com/photo-1560518883-ce09059eeffa') center/cover;
      height:100vh; display:flex; align-items:center; justify-content:center;
      color:white; text-align:center;
    }
    .overlay { background:rgba(0,0,0,0.6); padding:40px; border-radius:15px; }
    .section { padding:60px 20px; text-align:center; }
    .cards { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
    .card { width:300px; box-shadow:0 5px 15px rgba(0,0,0,0.2); border-radius:15px; overflow:hidden; }
    .card img { width:100%; }
    input, textarea {
      width:100%; padding:10px; margin:10px 0;
    }
    button { padding:12px 20px; background:black; color:white; border:none; }
  </style>
</head>

<body>

<div class="hero">
  <div class="overlay">
    <h1>Bhupathi Real Estates</h1>
    <p>Premium Plots. Prime Locations.</p>
  </div>
</div>

<div class="section">
  <h2>Our Ventures</h2>
  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae">
      <h3>Green City</h3>
      <p>150–300 Sq.Yards</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1494526585095-c41746248156">
      <h3>Golden Enclave</h3>
      <p>200–400 Sq.Yards</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Location</h2>
  <iframe src="https://maps.google.com/maps?q=Hyderabad&output=embed"
  width="100%" height="300"></iframe>
</div>

<div class="section">
  <h2>Enquiry</h2>
  <input placeholder="Name">
  <input placeholder="Phone">
  <textarea placeholder="Message"></textarea>
  <button>Submit</button>
</div>

</body>
</html>
